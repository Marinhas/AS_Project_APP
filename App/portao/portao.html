<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="globals.css" />
    <link rel="stylesheet" href="styleguide.css" />
    <link rel="stylesheet" href="style.css" />
    <script src="../JS/scripts.js"></script>
  </head>
  <body>
    <div class="iphone-pro-max">
      <div class="aberto">
        <div class="overlap-group-2">
          <div class="text-wrapper-3">Aberto</div>
          <div class="ellipse-2"></div>
        </div>
      </div>
      <div class="div">
        <div class="group">
          <div class="time">9:41</div>
          <div class="right-side">
            <img class="statusbar-battery" src="https://c.animaapp.com/yksYBIPQ/img/-statusbar-battery@2x.png" />
            <img class="wifi" src="https://c.animaapp.com/yksYBIPQ/img/wifi@2x.png" />
            <img class="icon-mobile-signal" src="https://c.animaapp.com/yksYBIPQ/img/icon---mobile-signal@2x.png" />
          </div>
        </div>
        <div class="overlap">
          <div class="overlap-group">
            <div class="rectangle"></div>
            <img class="subtract" src="https://c.animaapp.com/yksYBIPQ/img/subtract@2x.png" />
            <div class="ellipse"></div>
            <div class="group-2">
              <div class="frame">
                <img class="img" src="https://c.animaapp.com/yksYBIPQ/img/home@2x.png" onclick="window.location.href ='../Homepage/homepage.html';"/>
                <img class="img" src="https://c.animaapp.com/yksYBIPQ/img/responsive@2x.png" />
              </div>
              <div class="frame-2">
                <img
                  class="notifications-icon"
                  src="https://c.animaapp.com/yksYBIPQ/img/notifications-icon-1791x2048-rk2vz974-1---button@2x.png"  onclick="window.location.href ='../Notificacoes/notificacoes.html';"
                />
                <img class="img" src="https://c.animaapp.com/yksYBIPQ/img/user---button@2x.png" onclick="window.location.href ='../perfil/perfil.html';"/>
              </div>
            </div>
            <div class="group-3">
              <div class="frame-3">
                <div class="text-wrapper">Dar acesso</div>
                <img class="right-arrow" src="https://c.animaapp.com/yksYBIPQ/img/right-arrow-1-2@2x.png" />
              </div>
              <img class="passkey" src="https://c.animaapp.com/yksYBIPQ/img/passkey-1@2x.png" />

               <div>
                  <button class="partilhar-button" onclick="openPopup()">Criar uma chave</button>
                </div>
                
            </div>
          </div>
          <div class="loocker-entrada">
            <div class="padlock-wrapper">
              <img class="padlock" src="https://c.animaapp.com/yksYBIPQ/img/padlock--2--2-1@2x.png" />
            </div>
            <div class="overlap-2">
              <div class="boto-bloqueado">
                <img class="padlock" src="https://c.animaapp.com/yksYBIPQ/img/padlock--3--2-1@2x.png" />
              </div>
              <div class="group-4">
                <img class="right-arrow-2" src="https://c.animaapp.com/yksYBIPQ/img/right-arrow-1-4@2x.png" />
                <img class="right-arrow-3" src="https://c.animaapp.com/yksYBIPQ/img/right-arrow-2-3@2x.png" />
                <img class="right-arrow-4" src="https://c.animaapp.com/yksYBIPQ/img/right-arrow-3-4@2x.png" />
              </div>
              <div class="group-4">
                <img class="right-arrow-2" src="https://c.animaapp.com/yksYBIPQ/img/right-arrow-1-4@2x.png" />
                <img class="right-arrow-3" src="https://c.animaapp.com/yksYBIPQ/img/right-arrow-2-3@2x.png" />
                <img class="right-arrow-4" src="https://c.animaapp.com/yksYBIPQ/img/right-arrow-3-4@2x.png" />
              </div>
            </div>
          </div>
        </div>
        <div class="text-wrapper-4">Portão</div>
        <div class="overlap-3">
          <img class="image" src="https://c.animaapp.com/C2GzRNbM/img/gate-1@2x.png" />
          <div class="group-5">
            <div class="text-wrapper-5">Conectado</div>
            <div class="ellipse-3"></div>
          </div>
          <div class="group-6">
            <img class="battery" src="https://c.animaapp.com/yksYBIPQ/img/battery-1@2x.png" />
            <div class="text-wrapper-6">67%</div>
          </div>
          <div class="frame-button" onclick="window.location.href = '../cameraFora/camerafora';">
            <div class="text-wrapper-7">Acessar camera</div>
            <div class="frame-4">
              <img class="img" src="https://c.animaapp.com/yksYBIPQ/img/camera-1@2x.png" />
              <img class="right-arrow-5" src="https://c.animaapp.com/yksYBIPQ/img/right-arrow-3-2@2x.png" />
            </div>
          </div>
        </div>
        <img class="frame-5" src="https://c.animaapp.com/yksYBIPQ/img/frame-9@2x.png"onclick="goBack()"/>
      </div>
    </div>
  </body>
</html>
