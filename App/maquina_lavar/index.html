<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="globals.css" />
    <link rel="stylesheet" href="styleguide.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="iphone-pro-max">
      <div class="div">
        <div class="group">
          <div class="time">9:41</div>
          <div class="right-side">
            <img class="statusbar-battery" src="https://c.animaapp.com/9fG3ej7i/img/-statusbar-battery@2x.png" />
            <img class="wifi" src="https://c.animaapp.com/9fG3ej7i/img/wifi@2x.png" />
            <img class="icon-mobile-signal" src="https://c.animaapp.com/9fG3ej7i/img/icon---mobile-signal@2x.png" />
          </div>
        </div>
        <div class="overlap">
          <div class="rectangle"></div>
          <img class="subtract" src="https://c.animaapp.com/9fG3ej7i/img/subtract@2x.png" />
          <div class="ellipse"></div>
          <div class="group-2">
            <div class="frame">
              <img class="img" src="https://c.animaapp.com/9fG3ej7i/img/home---button@2x.png" />
              <img class="img" src="https://c.animaapp.com/9fG3ej7i/img/responsive@2x.png" />
            </div>
            <div class="frame-2">
              <img
                class="notifications-icon"
                src="https://c.animaapp.com/9fG3ej7i/img/notifications-icon-1791x2048-rk2vz974-1---button@2x.png"
              />
              <img class="img" src="https://c.animaapp.com/9fG3ej7i/img/user---button@2x.png" />
            </div>
          </div>
          <div class="group-wrapper"><div class="group-3"></div></div>
          <div class="text-wrapper">1,5W</div>
          <div class="text-wrapper-2">Usado</div>
          <div class="text-wrapper-3">21W</div>
          <div class="rectangle-2"></div>
          <div class="frame-3">
            <div class="text-wrapper-4">Dar acesso</div>
            <img class="right-arrow" src="https://c.animaapp.com/9fG3ej7i/img/right-arrow-1@2x.png" />
          </div>
          <img class="passkey" src="https://c.animaapp.com/9fG3ej7i/img/passkey-1@2x.png" />
          <div class="group-button">
            <div class="overlap-group"><div class="text-wrapper-5">Criar uma chave</div></div>
          </div>
          <div class="consultar-custos">Consultar custos</div>
        </div>
        <div class="text-wrapper-6">Máquina de lavar roupa</div>
        <div class="overlap-2">
          <img class="maquina-de-lavar" src="https://c.animaapp.com/9fG3ej7i/img/maquina-de-lavar-1@2x.png" />
          <div class="group-4">
            <div class="text-wrapper-7">Connected</div>
            <div class="ellipse-2"></div>
          </div>
          <div class="selecione-um">Selecione um programa</div>
        </div>
        <img class="frame-button" src="https://c.animaapp.com/9fG3ej7i/img/frame-9---button-1@2x.png" />
        <div class="rectangle-3"></div>
        <div class="overlap-wrapper">
          <div class="div-wrapper"><div class="text-wrapper-8">Configurar um programa</div></div>
        </div>
      </div>
    </div>
  </body>
</html>
