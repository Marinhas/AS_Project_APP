<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="globals.css" />
    <link rel="stylesheet" href="styleguide.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="cozinha-luz">
      <div class="div">
        <div class="group">
          <div class="time">9:41</div>
          <div class="right-side">
            <img class="statusbar-battery" src="https://c.animaapp.com/vWUxevRq/img/-statusbar-battery@2x.png" />
            <img class="wifi" src="https://c.animaapp.com/vWUxevRq/img/wifi@2x.png" />
            <img class="icon-mobile-signal" src="https://c.animaapp.com/vWUxevRq/img/icon---mobile-signal@2x.png" />
          </div>
        </div>
        <div class="overlap">
          <div class="overlap-group">
            <div class="rectangle"></div>
            <img class="subtract" src="https://c.animaapp.com/vWUxevRq/img/subtract@2x.png" />
            <div class="ellipse"></div>
            <div class="group-2">
              <div class="frame">
                <img class="img" src="https://c.animaapp.com/vWUxevRq/img/home@2x.png" />
                <img class="img" src="https://c.animaapp.com/vWUxevRq/img/responsive@2x.png" />
              </div>
              <div class="frame-2">
                <img
                  class="notifications-icon"
                  src="https://c.animaapp.com/vWUxevRq/img/notifications-icon-1791x2048-rk2vz974-1@2x.png"
                />
                <img class="img" src="https://c.animaapp.com/vWUxevRq/img/user@2x.png" />
              </div>
            </div>
            <div class="group-wrapper">
              <div class="overlap-group-wrapper">
                <div class="div-wrapper"><div class="text-wrapper">Consultar custos</div></div>
              </div>
            </div>
            <div class="text-wrapper-2">5W</div>
            <div class="text-wrapper-3">Usado</div>
            <div class="text-wrapper-4">75W</div>
            <div class="rectangle-2"></div>
            <div class="frame-3">
              <div class="text-wrapper-5">Dar acesso</div>
              <img class="right-arrow" src="https://c.animaapp.com/vWUxevRq/img/right-arrow-1-1@2x.png" />
            </div>
            <img class="passkey" src="https://c.animaapp.com/vWUxevRq/img/passkey-1@2x.png" />
            <div class="overlap-wrapper">
              <div class="div-wrapper"><div class="text-wrapper-6">Criar uma chave</div></div>
            </div>
          </div>
          <div class="overlap-2">
            <div class="rectangle-3"></div>
            <div class="group-3">
              <div class="text-wrapper-7">Connected</div>
              <div class="ellipse-2"></div>
            </div>
            <div class="setup-luz">
              <div class="text-wrapper-8">ON</div>
              <div class="ceiling-lamp-wrapper">
                <img class="ceiling-lamp" src="https://c.animaapp.com/vWUxevRq/img/ceiling-lamp-2-1@2x.png" />
              </div>
              <div class="overlap-3">
                <div class="group-4">
                  <img class="right-arrow-2" src="https://c.animaapp.com/vWUxevRq/img/right-arrow-1-2@2x.png" />
                  <img class="right-arrow-3" src="https://c.animaapp.com/vWUxevRq/img/right-arrow-2-1@2x.png" />
                  <img class="right-arrow-4" src="https://c.animaapp.com/vWUxevRq/img/right-arrow-3-1@2x.png" />
                </div>
                <div class="botao"><img class="img-2" src="https://c.animaapp.com/vWUxevRq/img/lamp-3@2x.png" /></div>
                <div class="img-wrapper">
                  <img class="img-2" src="https://c.animaapp.com/vWUxevRq/img/ceiling-lamp-1-1@2x.png" />
                </div>
              </div>
              <div class="group-5">
                <div class="text-wrapper-9">Brilho</div>
                <div class="text-wrapper-10">10%</div>
              </div>
              <div class="group-6">
                <img class="group-7" src="https://c.animaapp.com/vWUxevRq/img/group-44-1@2x.png" />
              </div>
              <div class="line-wrapper">
                <img class="line" src="https://c.animaapp.com/vWUxevRq/img/line-3-1@2x.png" />
              </div>
            </div>
          </div>
        </div>
        <div class="text-wrapper-11">Luz 1</div>
        <img class="frame-button" src="https://c.animaapp.com/vWUxevRq/img/frame-9---button-1@2x.png" />

</html>
